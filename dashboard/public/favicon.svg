<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Vibrant indigo to teal gradient -->
    <linearGradient id="teleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />    <!-- Indigo -->
      <stop offset="50%" stop-color="#06b6d4" />   <!-- Cyan -->
      <stop offset="100%" stop-color="#14b8a6" />  <!-- Teal -->
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    .shield { stroke: url(#teleGrad); fill: none; stroke-width: 5.5; stroke-linecap: round; stroke-linejoin: round; filter: url(#glow); }
    .bar-l { fill: url(#teleGrad); opacity: 0.7; }
    .bar-m { fill: url(#teleGrad); }
    .bar-r { fill: url(#teleGrad); opacity: 0.85; }
    .wave { fill: none; stroke-width: 3.5; stroke-linecap: round; stroke: #ffffff; filter: drop-shadow(0px 1px 2px rgba(0,0,0,0.3)); }
    @media (prefers-color-scheme: light) {
      .wave { stroke: #0f172a; }
    }
  </style>

  <!-- Outer Shield representing Privacy -->
  <path class="shield" d="M50 18 C64 18, 70 24, 75 28 C75 45, 68 62, 50 82 C32 62, 25 45, 25 28 C30 24, 36 18, 50 18 Z" />
        
  <!-- Telemetry Bar Chart elements inside the shield -->
  <rect class="bar-l" x="37" y="46" width="6" height="18" rx="3" />
  <rect class="bar-m" x="47" y="34" width="6" height="30" rx="3" />
  <rect class="bar-r" x="57" y="40" width="6" height="24" rx="3" />
  
  <!-- Dynamic wave line flowing across the charts -->
  <path class="wave" d="M33 52 Q 43 40, 50 48 T 67 38" />
</svg>
