<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- SVG Favicon with PNG / ICO fallback -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="robots" content="index, follow" />

    <!-- Geist Font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.css" />

    <!-- Static Fallback SEO -->
    <title>Telemetry | Privacy-Focused Open-Source Web Analytics</title>
    <meta name="description" content="Telemetry is a cookieless, privacy-first open-source analytics platform providing clear and aggregated site insights without tracking individuals." />
    <meta name="keywords" content="analytics, web analytics, privacy-first analytics, cookieless analytics, open source, self-hosted analytics, privacy tracking" />

    <!-- Static Fallback Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Telemetry | Privacy-Focused Open-Source Web Analytics" />
    <meta property="og:description" content="Telemetry is a cookieless, privacy-first open-source analytics platform providing clear and aggregated site insights without tracking individuals." />
    <meta property="og:image" content="/logo.svg" />

    <!-- Static Fallback Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Telemetry | Privacy-Focused Open-Source Web Analytics" />
    <meta name="twitter:description" content="Telemetry is a cookieless, privacy-first open-source analytics platform providing clear and aggregated site insights without tracking individuals." />
    <meta name="twitter:image" content="/logo.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
